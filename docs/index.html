<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — MRCP Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d0f14; --surface:#161a23; --surface-2:#1f2532; --line:#2a3142;
  --text:#e8ecf3; --muted:#8a93a6; --accent:#ff5722; --accent-2:#ffc107;
  --good:#4caf50; --warn:#ff9800; --bad:#f44336;
  --shadow:0 4px 20px rgba(0,0,0,.4);
  --radius:10px;
}
[data-theme="light"]{
  --bg:#f5f6f8; --surface:#ffffff; --surface-2:#eef0f4; --line:#dde0e7;
  --text:#1a1d23; --muted:#5c6573; --accent:#e64a19; --accent-2:#f57c00;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box}
body{margin:0;font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);line-height:1.4;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* Header */
.topbar{background:var(--surface);border-bottom:2px solid var(--accent);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.brand-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent-2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff}
.brand-name{font-size:18px;font-weight:700;letter-spacing:.5px}
.brand-sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.topbar-actions{display:flex;gap:10px;align-items:center}
.theme-btn{background:var(--surface-2);border:1px solid var(--line);color:var(--text);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:18px;line-height:1;transition:all .2s}
.theme-btn:hover{border-color:var(--accent)}
.share-btn{background:var(--surface-2);border:1px solid var(--line);color:var(--text);padding:8px 14px;border-radius:8px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;transition:all .2s}
.share-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Tabs nav */
.tabs{background:var(--surface);border-bottom:1px solid var(--line);padding:0 20px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{background:transparent;border:none;color:var(--muted);padding:14px 18px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;text-transform:uppercase;letter-spacing:1px;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Layout */
.container{max-width:1400px;margin:0 auto;padding:24px 20px}
.tab-content{display:none;animation:fadeIn .3s ease-out}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:20px;box-shadow:var(--shadow)}
.card h2{margin:0 0 16px;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);display:flex;align-items:center;gap:8px}
.card h3{margin:0 0 12px;font-size:15px;font-weight:600;color:var(--text)}
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}

/* Stat tile */
.stat{background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:16px;position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--text)}
.stat-sub{font-size:12px;color:var(--muted);margin-top:4px}

/* Table */
.table{width:100%;border-collapse:collapse;font-size:14px}
.table th,.table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
.table th{background:var(--surface-2);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.table tbody tr{transition:background .15s}
.table tbody tr:hover{background:var(--surface-2)}
.table .num{font-family:'JetBrains Mono',monospace;text-align:right}
.rank{display:inline-block;width:28px;height:28px;line-height:28px;text-align:center;border-radius:50%;font-weight:700;font-size:12px;background:var(--surface-2);color:var(--muted)}
.rank.r1{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1d23}
.rank.r2{background:linear-gradient(135deg,#c0c4cc,#9ea2ab);color:#1a1d23}
.rank.r3{background:linear-gradient(135deg,#cd7f32,#a8651f);color:#fff}

/* Session card */
.session-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center;gap:12px;text-decoration:none;color:inherit}
.session-card:hover{border-color:var(--accent);transform:translateY(-2px);text-decoration:none}
.session-card.disabled{cursor:not-allowed;opacity:.55}
.session-card.disabled:hover{border-color:var(--line);transform:none}
.session-date{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--accent)}
.session-meta{font-size:13px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap}
.session-best{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--accent-2)}

/* Pilot card */
.pilot-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;text-decoration:none;color:inherit;transition:all .2s;display:block}
.pilot-card:hover{border-color:var(--accent);transform:translateY(-2px);text-decoration:none}
.pilot-name{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--text)}
.pilot-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;font-size:12px}
.pilot-stat-label{color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-size:10px}
.pilot-stat-val{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent-2)}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.footer{text-align:center;padding:30px 20px;color:var(--muted);font-size:12px;letter-spacing:1px;text-transform:uppercase}

/* Charts */
.chart-wrap{position:relative;height:340px}

/* Toast for share */
.toast{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#fff;padding:12px 20px;border-radius:8px;box-shadow:var(--shadow);transform:translateY(100px);opacity:0;transition:all .3s;font-weight:600;z-index:100}
.toast.show{transform:translateY(0);opacity:1}

/* Responsive */
@media(max-width:768px){
  .topbar{padding:10px 14px}
  .container{padding:16px 12px}
  .brand-name{font-size:15px}
  .brand-sub{display:none}
  .tab-btn{padding:12px 12px;font-size:12px}
  .stat-value{font-size:20px}
  .table{font-size:12px}
  .table th,.table td{padding:8px 6px}
  .session-card{flex-direction:column;align-items:flex-start}
  .chart-wrap{height:260px}
}
</style>
</head>

function fmtLap(t){
  if(t==null) return '-';
  if(t>=60){var m=Math.floor(t/60);return m+':'+(t-60*m).toFixed(3).padStart(6,'0');}
  return t.toFixed(3);
}
function escapeHtml(s){return (''+s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}

// ===== HOME =====
function renderHome(){
  var el = document.getElementById('tab-home');
  var lastSession = SESSIONS[0];
  var totalSessions = SESSIONS.length;
  var totalPilots = PILOTS.length;
  var totalLaps = SESSIONS.reduce((a,s)=>a+s.total_laps,0);

  var bestLap = RECORDS.best_lap || {};
  var mostActive = RECORDS.most_active || {};

  var html = '';
  html += '<div class="card"><h2>Resume global</h2>';
  html += '<div class="grid grid-4">';
  html += '<div class="stat"><div class="stat-label">Sessions</div><div class="stat-value">'+totalSessions+'</div></div>';
  html += '<div class="stat"><div class="stat-label">Pilotes</div><div class="stat-value">'+totalPilots+'</div></div>';
  html += '<div class="stat"><div class="stat-label">Tours total</div><div class="stat-value">'+totalLaps+'</div></div>';
  if(RECORDS.club_avg_best!=null){
    html += '<div class="stat"><div class="stat-label">Moyenne meilleurs</div><div class="stat-value">'+fmtLap(RECORDS.club_avg_best)+'</div></div>';
  }
  html += '</div></div>';

  // Record absolu
  if(bestLap.time!=null){
    html += '<div class="card"><h2>🏆 Record absolu du club</h2>';
    html += '<div class="grid grid-2">';
    html += '<div class="stat" style="border-left:none">';
    html += '<div class="stat-label">Meilleur tour</div>';
    html += '<div class="stat-value" style="font-size:32px;color:var(--accent-2)">'+fmtLap(bestLap.time)+'</div>';
    html += '<div class="stat-sub">par <a href="pilote_'+escapeHtml(bestLap.slug||'')+'.html">'+escapeHtml(bestLap.pilot)+'</a> le '+escapeHtml(bestLap.date)+'</div>';
    html += '</div>';
    if(mostActive.name){
      html += '<div class="stat">';
      html += '<div class="stat-label">Pilote le plus actif</div>';
      html += '<div class="stat-value" style="font-size:22px"><a href="pilote_'+escapeHtml(mostActive.slug||'')+'.html">'+escapeHtml(mostActive.name)+'</a></div>';
      html += '<div class="stat-sub">'+mostActive.laps+' tours cumules</div>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  // Derniere session
  if(lastSession){
    html += '<div class="card"><h2>📅 Derniere session — '+escapeHtml(lastSession.date)+'</h2>';
    html += '<div class="grid grid-3">';
    html += '<div class="stat"><div class="stat-label">Pilotes</div><div class="stat-value">'+lastSession.pilot_count+'</div></div>';
    html += '<div class="stat"><div class="stat-label">Tours roules</div><div class="stat-value">'+lastSession.total_laps+'</div></div>';
    if(lastSession.best!=null){
      html += '<div class="stat"><div class="stat-label">Meilleur tour</div><div class="stat-value">'+fmtLap(lastSession.best)+'</div><div class="stat-sub">'+escapeHtml(lastSession.best_pilot)+'</div></div>';
    }
    html += '</div>';
    if(lastSession.file){
      html += '<div style="margin-top:16px"><a class="share-btn" href="'+lastSession.file+'">Voir le rapport detaille →</a></div>';
    }
    html += '</div>';
  }
  el.innerHTML = html;
}

// ===== SESSIONS =====
function renderSessions(){
  var el = document.getElementById('tab-sessions');
  var html = '<div class="card"><h2>Toutes les sessions ('+SESSIONS.length+')</h2>';
  if(!SESSIONS.length){
    html += '<div class="empty">Aucune session enregistree</div>';
  } else {
    html += '<div class="grid grid-2">';
    SESSIONS.forEach(function(s){
      var clickable = s.file ? '' : 'disabled';
      var tag = s.file ? 'a' : 'div';
      var href = s.file ? ('href="'+s.file+'"') : '';
      html += '<'+tag+' class="session-card '+clickable+'" '+href+'>';
      html += '<div>';
      html += '<div class="session-date">'+escapeHtml(s.date)+'</div>';
      html += '<div class="session-meta">';
      html += '<span>'+s.pilot_count+' pilotes</span>';
      html += '<span>'+s.total_laps+' tours</span>';
      if(!s.file) html += '<span style="color:var(--warn)">⚠ rapport manquant</span>';
      html += '</div></div>';
      if(s.best!=null){
        html += '<div style="text-align:right"><div class="session-best">'+fmtLap(s.best)+'</div><div style="font-size:11px;color:var(--muted)">'+escapeHtml(s.best_pilot)+'</div></div>';
      }
      html += '</'+tag+'>';
    });
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

// ===== PILOTS =====
function renderPilots(){
  var el = document.getElementById('tab-pilots');
  var html = '<div class="card"><h2>Tous les pilotes ('+PILOTS.length+')</h2>';
  if(!PILOTS.length){
    html += '<div class="empty">Aucun pilote enregistre</div>';
  } else {
    html += '<div class="grid grid-3">';
    PILOTS.forEach(function(p){
      html += '<a class="pilot-card" href="pilote_'+escapeHtml(p.slug)+'.html">';
      html += '<div class="pilot-name">'+escapeHtml(p.name)+'</div>';
      html += '<div class="pilot-stats">';
      html += '<div><div class="pilot-stat-label">Meilleur</div><div class="pilot-stat-val">'+fmtLap(p.best)+'</div></div>';
      html += '<div><div class="pilot-stat-label">Sessions</div><div class="pilot-stat-val">'+p.sessions_count+'</div></div>';
      html += '<div><div class="pilot-stat-label">Tours</div><div class="pilot-stat-val">'+p.total_laps+'</div></div>';
      html += '<div><div class="pilot-stat-label">Moy. best</div><div class="pilot-stat-val">'+fmtLap(p.mean_best)+'</div></div>';
      html += '</div></a>';
    });
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

function renderRankings(){

  html += renderRankTable(byBest.slice(0,15), 'best', 'Meilleur', fmtLap);
  html += '</div>';

  // Top regularite (plus petit ecart-type moyen)
  var byReg = PILOTS.filter(p=>p.sessions_count>=2 && p.mean_avg!=null).slice().sort((a,b)=>{
    var avgStdA = (a.sessions||[]).reduce((s,x)=>s+(x.std||0),0)/(a.sessions_count||1);
    var avgStdB = (b.sessions||[]).reduce((s,x)=>s+(x.std||0),0)/(b.sessions_count||1);
    return avgStdA - avgStdB;
  });
  html += '<div class="card"><h2>📏 Top regularite (ecart-type moyen le plus bas)</h2>';
  html += renderRankTable(byReg.slice(0,15), 'std_avg', 'Std moy.', function(p){
    var avg = (p.sessions||[]).reduce((s,x)=>s+(x.std||0),0)/(p.sessions_count||1);
    return avg.toFixed(3)+'s';
  }, true);
  html += '</div>';

  // Top volume
  var byVol = PILOTS.slice().sort((a,b)=>b.total_laps-a.total_laps);
  html += '<div class="card"><h2>🔁 Top volume (tours cumules)</h2>';
  html += renderRankTable(byVol.slice(0,15), 'total_laps', 'Tours', function(p){return p.total_laps;}, true);
  html += '</div>';

  el.innerHTML = html;
}
function renderRankTable(arr, field, colName, fmt, useFn){
  if(!arr.length) return '<div class="empty">Pas assez de donnees</div>';
  var h = '<table class="table"><thead><tr><th></th><th>Pilote</th><th class="num">'+colName+'</th><th class="num">Sessions</th></tr></thead><tbody>';
  arr.forEach(function(p,i){
    var rkClass = i<3 ? 'rank r'+(i+1) : 'rank';
    var val = useFn ? fmt(p) : fmt(p[field]);
    h += '<tr><td><span class="'+rkClass+'">'+(i+1)+'</span></td>';
    h += '<td><a href="pilote_'+escapeHtml(p.slug)+'.html">'+escapeHtml(p.name)+'</a></td>';
    h += '<td class="num">'+val+'</td>';
    h += '<td class="num">'+p.sessions_count+'</td></tr>';
  });
  h += '</tbody></table>';
  return h;
}

// ===== PROGRESS =====
function parseDateFR(d){var p=d.split('/');return new Date(p[2],p[1]-1,p[0]);}

function renderProgress(){
  var el = document.getElementById('tab-progress');
  if(!SESSIONS.length){
    el.innerHTML = '<div class="card"><div class="empty">Pas encore de donnees</div></div>';
    return;
  }

  var lastDate = SESSIONS[0].date;  // SESSIONS sont tries date desc
  var html = '';

  // === Bloc 1 : ameliorations sur la derniere session ===
  // Pour chaque pilote present dans la derniere session, comparer son best a celui de sa session precedente
  var improvedLast = [];
  PILOTS.forEach(function(p){
    var sessions = (p.sessions||[]).slice().sort(function(a,b){return parseDateFR(b.date)-parseDateFR(a.date);});
    if(sessions.length<2) return;
    if(sessions[0].date !== lastDate) return;
    var curr = sessions[0].best, prev = sessions[1].best;
    if(curr==null || prev==null) return;
    improvedLast.push({
      pilot: p, curr: curr, prev: prev, delta: prev-curr,
      pct: ((prev-curr)/prev)*100, prevDate: sessions[1].date
    });
  });
  improvedLast.sort(function(a,b){return b.delta-a.delta;});

  html += '<div class="card"><h2>🔥 Derniere session ('+escapeHtml(lastDate)+') vs precedente</h2>';
  if(!improvedLast.length){
    html += '<div class="empty">Personne n\'a 2 sessions consecutives a comparer</div>';
  } else {
    html += '<table class="table"><thead><tr><th></th><th>Pilote</th><th class="num">Avant</th><th class="num">Apres</th><th class="num">Gain</th><th class="num">%</th></tr></thead><tbody>';
    improvedLast.forEach(function(r,i){
      var rkClass = i<3 && r.delta>0 ? 'rank r'+(i+1) : 'rank';
      var deltaColor = r.delta>0 ? 'var(--good)' : (r.delta<0 ? 'var(--bad)' : 'var(--muted)');
      var sign = r.delta>0 ? '−' : (r.delta<0 ? '+' : '');
      var deltaTxt = sign + Math.abs(r.delta).toFixed(3) + 's';
      var pctTxt = sign + Math.abs(r.pct).toFixed(2) + '%';
      html += '<tr>';
      html += '<td><span class="'+rkClass+'">'+(i+1)+'</span></td>';
      html += '<td><a href="pilote_'+escapeHtml(r.pilot.slug)+'.html">'+escapeHtml(r.pilot.name)+'</a><div style="font-size:11px;color:var(--muted)">vs '+escapeHtml(r.prevDate)+'</div></td>';
      html += '<td class="num">'+fmtLap(r.prev)+'</td>';
      html += '<td class="num">'+fmtLap(r.curr)+'</td>';
      html += '<td class="num" style="color:'+deltaColor+';font-weight:700">'+deltaTxt+'</td>';
      html += '<td class="num" style="color:'+deltaColor+'">'+pctTxt+'</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';

  // === Bloc 2 : nouveaux records personnels (ever) ===
  // Un pilote bat son record si dans sa derniere session, son best == son best global ET il a >=2 sessions
  var newRecords = [];
  PILOTS.forEach(function(p){
    var sessions = (p.sessions||[]).slice().sort(function(a,b){return parseDateFR(b.date)-parseDateFR(a.date);});
    if(sessions.length<2) return;
    var last = sessions[0];
    if(last.best == null || p.best == null) return;
    // Si son best global est dans la derniere session
    if(Math.abs(last.best - p.best) < 0.001){
      var prevBest = Math.min.apply(null, sessions.slice(1).map(s=>s.best).filter(x=>x!=null));
      if(prevBest === Infinity) return;
      newRecords.push({
        pilot: p, newBest: last.best, prevBest: prevBest,
        delta: prevBest-last.best, pct: ((prevBest-last.best)/prevBest)*100,
        date: last.date
      });
    }
  });
  newRecords.sort(function(a,b){return b.delta-a.delta;});

  html += '<div class="card"><h2>🏆 Nouveaux records personnels (derniere session)</h2>';
  if(!newRecords.length){
    html += '<div class="empty">Aucun nouveau record personnel sur la derniere session</div>';
  } else {
    html += '<table class="table"><thead><tr><th></th><th>Pilote</th><th class="num">Ancien</th><th class="num">Nouveau</th><th class="num">Gain</th></tr></thead><tbody>';
    newRecords.forEach(function(r,i){
      var rkClass = i<3 ? 'rank r'+(i+1) : 'rank';
      html += '<tr>';
      html += '<td><span class="'+rkClass+'">'+(i+1)+'</span></td>';
      html += '<td><a href="pilote_'+escapeHtml(r.pilot.slug)+'.html">'+escapeHtml(r.pilot.name)+'</a></td>';
      html += '<td class="num">'+fmtLap(r.prevBest)+'</td>';
      html += '<td class="num" style="color:var(--accent-2);font-weight:700">'+fmtLap(r.newBest)+'</td>';
      html += '<td class="num" style="color:var(--good);font-weight:700">−'+r.delta.toFixed(3)+'s</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';

  // === Bloc 3 : progressions sur 30 derniers jours ===
  var now = new Date();
  var d30 = new Date(now.getTime() - 30*24*3600*1000);
  var progress30 = [];
  PILOTS.forEach(function(p){
    var inWindow = (p.sessions||[]).filter(s=>parseDateFR(s.date) >= d30).slice().sort(function(a,b){return parseDateFR(a.date)-parseDateFR(b.date);});
    if(inWindow.length < 2) return;
    var first = inWindow[0], last = inWindow[inWindow.length-1];
    if(first.best == null || last.best == null) return;
    progress30.push({
      pilot: p, first: first.best, last: last.best,
      delta: first.best - last.best, pct: ((first.best-last.best)/first.best)*100,
      sessions: inWindow.length, firstDate: first.date, lastDate: last.date
    });
  });
  progress30.sort(function(a,b){return b.delta-a.delta;});

  html += '<div class="card"><h2>📅 Progression sur 30 derniers jours</h2>';
  if(!progress30.length){
    html += '<div class="empty">Pas assez de donnees sur les 30 derniers jours</div>';
  } else {
    html += '<table class="table"><thead><tr><th></th><th>Pilote</th><th class="num">Sessions</th><th class="num">Debut</th><th class="num">Fin</th><th class="num">Evolution</th></tr></thead><tbody>';
    progress30.forEach(function(r,i){
      var rkClass = i<3 && r.delta>0 ? 'rank r'+(i+1) : 'rank';
      var deltaColor = r.delta>0 ? 'var(--good)' : (r.delta<0 ? 'var(--bad)' : 'var(--muted)');
      var sign = r.delta>0 ? '−' : (r.delta<0 ? '+' : '');
      var deltaTxt = sign + Math.abs(r.delta).toFixed(3) + 's (' + sign + Math.abs(r.pct).toFixed(1) + '%)';
      html += '<tr>';
      html += '<td><span class="'+rkClass+'">'+(i+1)+'</span></td>';
      html += '<td><a href="pilote_'+escapeHtml(r.pilot.slug)+'.html">'+escapeHtml(r.pilot.name)+'</a><div style="font-size:11px;color:var(--muted)">'+escapeHtml(r.firstDate)+' → '+escapeHtml(r.lastDate)+'</div></td>';
      html += '<td class="num">'+r.sessions+'</td>';
      html += '<td class="num">'+fmtLap(r.first)+'</td>';
      html += '<td class="num">'+fmtLap(r.last)+'</td>';
      html += '<td class="num" style="color:'+deltaColor+';font-weight:700">'+deltaTxt+'</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';

  el.innerHTML = html;
}

// ===== TABS =====
document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.onclick = function(){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    var tab = btn.getAttribute('data-tab');
    document.getElementById('tab-'+tab).classList.add('active');
    if(tab==='progress') renderProgress();
    history.replaceState(null,'','#'+tab);
  };
});

// Init + deep link
function activateFromHash(){
  var h = (location.hash||'').replace('#','');
  if(h && document.getElementById('tab-'+h)){
    var btn = document.querySelector('.tab-btn[data-tab="'+h+'"]');
    if(btn) btn.click();
  }
}

renderHome();
renderSessions();
renderPilots();
renderRankings();
activateFromHash();


(function(){
  var saved = localStorage.getItem('mrcp-theme') || 'dark';
  document.body.setAttribute('data-theme', saved);
  var btn = document.getElementById('themeBtn');
  if(btn){
    btn.textContent = saved === 'dark' ? '☀' : '☾';
    btn.onclick = function(){
      var cur = document.body.getAttribute('data-theme');
      var next = cur === 'dark' ? 'light' : 'dark';
      document.body.setAttribute('data-theme', next);
      localStorage.setItem('mrcp-theme', next);
      btn.textContent = next === 'dark' ? '☀' : '☾';
      // Recolore les charts
      if(window._refreshCharts) window._refreshCharts();
    };
  }
})();
