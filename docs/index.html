<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRCP Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222535;--border:#2e3250;--accent:#e63946;--gold:#FFD700;--silver:#C0C0C0;--bronze:#CD7F32;--text:#e8eaf0;--muted:#7b82a8;--green:#2ecc71;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;}
header{background:linear-gradient(135deg,#1a1d27,#16192a);border-bottom:1px solid var(--border);padding:22px 40px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.logo{font-size:26px;font-weight:900;}.logo span{color:var(--accent);}
.subtitle{color:var(--muted);font-size:13px;margin-top:3px;}
.badge{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;color:var(--muted);}
main{max-width:1400px;margin:0 auto;padding:28px 24px;}
.section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;margin-top:28px;}
.section-title:first-child{margin-top:0;}
.sessions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;text-decoration:none;color:var(--text);transition:all .2s;display:block;}
.session-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.session-date{font-size:16px;font-weight:700;margin-bottom:8px;}
.session-meta{font-size:11px;color:var(--muted);margin-bottom:10px;}
.session-podium{display:flex;gap:8px;}
.pcard{flex:1;background:var(--surface2);border-radius:8px;padding:8px;text-align:center;}
.pcard .medal{font-size:16px;}
.pcard .pname{font-size:10px;font-weight:600;margin:3px 0 1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard .ptime{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;}
.pcard.gold .ptime{color:var(--gold);}.pcard.silver .ptime{color:var(--silver);}.pcard.bronze .ptime{color:var(--bronze);}
.evo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px;}
.evo-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;}
.evo-name{font-size:13px;font-weight:700;margin-bottom:12px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.stats-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:8px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.stat-box .val{font-size:22px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums;}
.stat-box .lbl{font-size:10px;color:var(--muted);margin-top:4px;}
footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:32px;}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">MRCP <span>Dashboard</span></div>
    <div class="subtitle">Mini Racing Club Palois — Suivi des performances</div>
  </div>
  <div class="badge">Mis à jour le 03/05/2026 à 10:47</div>
</header>
<main>

<div class="section-title">📊 Résumé global</div>
<div class="stats-summary" id="summary"></div>

<div class="section-title">📅 Sessions récentes</div>
<div class="sessions-grid" id="sessionsGrid"></div>

<div class="section-title">📈 Évolution du meilleur tour — Tous les pilotes</div>
<div class="chart-card"><canvas id="evoGlobal" height="160"></canvas></div>

<div class="section-title">🏎️ Évolution par pilote</div>
<div class="evo-grid" id="evoGrid"></div>

</main>
<footer>MRCP Dashboard · Tours 31s–50s · Généré automatiquement par SpeedHive App</footer>

function fmt(s){const m=Math.floor(s/60),sec=s-m*60;return `${m}:${sec.toFixed(3).padStart(6,'0')}`;}
function color(i,a=1){const c=PALETTE[i%PALETTE.length];if(a===1)return c;const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

// SUMMARY
const allPilots=new Set(Object.values(HISTORY).map(p=>p.name));
const allSessions=SESSIONS.length;
const allDates=[...new Set(Object.values(HISTORY).flatMap(p=>p.sessions.map(s=>s.date)))];
let globalBest=999,globalBestName='';
Object.values(HISTORY).forEach(p=>p.sessions.forEach(s=>{if(s.best<globalBest){globalBest=s.best;globalBestName=p.name;}}));

document.getElementById('summary').innerHTML=`
  <div class="stat-box"><div class="val">${allSessions}</div><div class="lbl">Sessions analysées</div></div>
  <div class="stat-box"><div class="val">${allPilots.size}</div><div class="lbl">Pilotes différents</div></div>
  <div class="stat-box"><div class="val">${allDates.length}</div><div class="lbl">Jours de roulage</div></div>
  <div class="stat-box"><div class="val" style="font-size:16px">${globalBest<999?fmt(globalBest):'—'}</div><div class="lbl">Record absolu — ${globalBestName}</div></div>
`;

// SESSIONS GRID
const grid=document.getElementById('sessionsGrid');
SESSIONS.slice().reverse().forEach(s=>{
  const card=document.createElement('a');
  card.className='session-card';
  card.href=s.file;
  const top3=s.podium.slice(0,3);
  const classes=['gold','silver','bronze'];
  const medals=['🥇','🥈','🥉'];
  card.innerHTML=`
    <div class="session-date">🏁 ${s.date}</div>
    <div class="session-meta">${s.pilots} pilote${s.pilots>1?'s':''} · ${s.total_laps} tours valides</div>
    <div class="session-podium">${top3.map((p,i)=>`<div class="pcard ${classes[i]}"><div class="medal">${medals[i]}</div><div class="pname">${p.name.split(' ')[0]}</div><div class="ptime">${fmt(p.best)}</div></div>`).join('')}</div>`;
  grid.appendChild(card);
});

// EVO GLOBAL
const pids=Object.keys(HISTORY).filter(pid=>HISTORY[pid].sessions.length>=2);
if(pids.length){
  const allD=[...new Set(pids.flatMap(pid=>HISTORY[pid].sessions.map(s=>s.date)))].sort();
  new Chart(document.getElementById('evoGlobal'),{type:'line',
    data:{labels:allD,datasets:pids.map((pid,i)=>{
      const p=HISTORY[pid];
      return {label:p.name.split(' ')[0],data:allD.map(d=>{const s=p.sessions.find(s=>s.date===d);return s?s.best:null;}),
        borderColor:PALETTE[i%PALETTE.length],backgroundColor:'transparent',pointRadius:5,borderWidth:2,tension:.3,spanGaps:false};
    })},
    options:{responsive:true,plugins:{legend:{labels:{color:'#7b82a8',font:{size:10}}}},
      scales:{x:{ticks:{color:'#7b82a8',font:{size:9}},grid:{color:'#1e2136'}},
        y:{ticks:{color:'#7b82a8',callback:v=>fmt(v)},grid:{color:'#1e2136'}}}}
  });
} else {
  document.getElementById('evoGlobal').parentElement.innerHTML='<div style="color:#7b82a8;font-size:12px;padding:20px;text-align:center">Pas encore assez de sessions pour afficher l'évolution globale.</div>';
}

// EVO PAR PILOTE
const evoGrid=document.getElementById('evoGrid');
Object.keys(HISTORY).forEach((pid,idx)=>{
  const p=HISTORY[pid];
  if(p.sessions.length<2) return;
  const col=PALETTE[idx%PALETTE.length];
  const card=document.createElement('div');card.className='evo-card';
  const cid=`evo_${pid}`;
  card.innerHTML=`<div class="evo-name" style="color:${col}">${p.name}</div><canvas id="${cid}" height="160"></canvas>`;
  evoGrid.appendChild(card);
  new Chart(document.getElementById(cid),{type:'line',
    data:{labels:p.sessions.map(s=>s.date),datasets:[
      {label:'Meilleur',data:p.sessions.map(s=>s.best),borderColor:col,backgroundColor:'transparent',pointRadius:5,borderWidth:2,tension:.3},
      {label:'Moyenne',data:p.sessions.map(s=>s.mean),borderColor:col,backgroundColor:`${col}22`,pointRadius:3,borderWidth:1.5,tension:.3,borderDash:[4,3]},
    ]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#7b82a8',font:{size:9}}}},
      scales:{x:{ticks:{color:'#7b82a8',font:{size:8}},grid:{color:'#1e2136'}},
        y:{ticks:{color:'#7b82a8',callback:v=>fmt(v)},grid:{color:'#1e2136'}}}}
  });
