<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRCP Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222535;--border:#2e3250;--accent:#e63946;--gold:#FFD700;--silver:#C0C0C0;--bronze:#CD7F32;--text:#e8eaf0;--muted:#7b82a8;--green:#2ecc71;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;}
header{background:linear-gradient(135deg,#1a1d27,#16192a);border-bottom:1px solid var(--border);padding:22px 40px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.logo{font-size:26px;font-weight:900;}.logo span{color:var(--accent);}
.subtitle{color:var(--muted);font-size:13px;margin-top:3px;}
.badge{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;color:var(--muted);}
main{max-width:1400px;margin:0 auto;padding:28px 24px;}
.section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;margin-top:28px;}
.section-title:first-child{margin-top:0;}
.stats-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;}
.stat-box .val{font-size:28px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums;}
.stat-box .lbl{font-size:11px;color:var(--muted);margin-top:4px;}
.sessions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;text-decoration:none;color:var(--text);transition:all .2s;display:block;}
.session-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.session-date{font-size:16px;font-weight:700;margin-bottom:6px;}
.session-meta{font-size:11px;color:var(--muted);margin-bottom:12px;}
.session-podium{display:flex;gap:8px;}
.pcard{flex:1;background:var(--surface2);border-radius:8px;padding:8px;text-align:center;}
.pcard .medal{font-size:18px;}.pcard .pname{font-size:10px;font-weight:600;margin:3px 0 1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard .ptime{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.pcard.gold .ptime{color:var(--gold);}.pcard.silver .ptime{color:var(--silver);}.pcard.bronze .ptime{color:var(--bronze);}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.evo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px;}
.evo-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;}
.evo-name{font-size:13px;font-weight:700;margin-bottom:12px;}
.empty-msg{color:var(--muted);font-size:12px;padding:30px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;}
.files-section{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.file-link{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;text-decoration:none;color:var(--text);transition:all .2s;display:flex;align-items:center;gap:10px;}
.file-link:hover{border-color:var(--accent);transform:translateY(-1px);}
footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:32px;}
</style>
</head>
<body>
<header>
  <div><div class="logo">MRCP <span>Dashboard</span></div>
  <div class="subtitle">Mini Racing Club Palois — Suivi des performances</div></div>
  <div class="badge">🔄 Mis à jour le 04/05/2026 à 23:18</div>
</header>
<main>

<div class="section-title">📊 Résumé global</div>
<div class="stats-summary" id="summary"></div>

<div class="section-title">📅 Sessions par date</div>
<div class="sessions-grid" id="sessionsGrid"></div>

<div class="section-title">📂 Rapports détaillés</div>
<div class="files-section" id="filesSection"></div>

<div class="section-title">📈 Évolution du meilleur tour — Tous les pilotes</div>
<div class="chart-card"><canvas id="evoGlobal" height="160"></canvas></div>

<div class="section-title">🏎️ Évolution par pilote</div>
<div class="evo-grid" id="evoGrid"></div>

</main>
<footer>MRCP Dashboard · Tours 31s–50s · Généré automatiquement</footer>

<script>
const SESSIONS={};
const HISTORY={"8046737": {"name": "Gregoire Barroso", "sessions": [{"date": "02/05/2026", "best": 33.678, "mean": 36.558, "std": 2.166, "count": 28}]}, "7264035": {"name": "Olivier Saux", "sessions": [{"date": "02/05/2026", "best": 35.649, "mean": 37.173, "std": 1.075, "count": 6}]}, "7064819": {"name": "Mathieu Gregoire", "sessions": [{"date": "02/05/2026", "best": 43.621, "mean": 45.01, "std": 1.389, "count": 2}]}};
const FILES=["session_mrcp_02052026.html", "session_mrcp_20260502.html"];
const PALETTE=["#e63946", "#4cc9f0", "#f4a261", "#2ecc71", "#a855f7", "#ffd166", "#ff6b6b", "#06d6a0", "#118ab2", "#ef476f", "#ffd700", "#8ecae6", "#e9c46a", "#f77f00", "#d62828", "#023e8a", "#80b918", "#ff99c8", "#c77dff", "#48cae4", "#74c69d", "#52b788", "#ffb703", "#fb8500", "#219ebc", "#e76f51", "#264653", "#2a9d8f", "#9b2226", "#005f73"];

function fmt(s){const m=Math.floor(s/60),sec=s-m*60;return `${m}:${sec.toFixed(3).padStart(6,'0')}`;}
function sortDate(d){const[dd,mm,yy]=d.split('/');return `${yy}-${mm}-${dd}`;}

// SUMMARY
const allPilots=new Set(Object.values(HISTORY).filter(p=>!p.name.startsWith('Inconnu')).map(p=>p.name));
let globalBest=999,globalBestName='';
Object.values(HISTORY).forEach(p=>{if(p.name.startsWith('Inconnu'))return;p.sessions.forEach(s=>{if(s.best<globalBest){globalBest=s.best;globalBestName=p.name;}});});
const totalLaps=Object.values(HISTORY).reduce((a,p)=>a+p.sessions.reduce((b,s)=>b+s.count,0),0);
const allDatesSet=new Set(Object.values(HISTORY).flatMap(p=>p.sessions.map(s=>s.date)));

document.getElementById('summary').innerHTML=`
  <div class="stat-box"><div class="val">${allDatesSet.size}</div><div class="lbl">Jours de roulage</div></div>
  <div class="stat-box"><div class="val">${allPilots.size}</div><div class="lbl">Pilotes différents</div></div>
  <div class="stat-box"><div class="val">${totalLaps.toLocaleString()}</div><div class="lbl">Tours valides au total</div></div>
  <div class="stat-box"><div class="val" style="font-size:20px">${globalBest<999?fmt(globalBest):'—'}</div><div class="lbl">🏆 Record — ${globalBestName}</div></div>
`;

// SESSIONS PAR DATE — construit depuis l'historique directement
const dateMap={};
Object.values(HISTORY).forEach(p=>{
  p.sessions.forEach(s=>{
    if(!dateMap[s.date]) dateMap[s.date]={date:s.date,pilots:new Set(),laps:0,podium:[]};
    if(!p.name.startsWith('Inconnu')){
      dateMap[s.date].pilots.add(p.name);
      dateMap[s.date].podium.push({name:p.name,best:s.best});
    }
    dateMap[s.date].laps+=s.count;
  });
});

const datesSorted=Object.keys(dateMap).sort((a,b)=>sortDate(b).localeCompare(sortDate(a)));
const grid=document.getElementById('sessionsGrid');
const classes=['gold','silver','bronze']; const medals=['🥇','🥈','🥉'];

datesSorted.forEach(d=>{
  const info=dateMap[d];
  info.podium.sort((a,b)=>a.best-b.best);
  const top3=info.podium.slice(0,3);
  const card=document.createElement('div'); card.className='session-card';
  card.style.cursor='default';
  card.innerHTML=`<div class="session-date">🏁 ${d}</div>
    <div class="session-meta">${info.pilots.size} pilote${info.pilots.size>1?'s':''} · ${info.laps} tours valides</div>
    <div class="session-podium">${top3.map((p,i)=>`<div class="pcard ${classes[i]}"><div class="medal">${medals[i]}</div><div class="pname">${p.name.split(' ')[0]}</div><div class="ptime">${fmt(p.best)}</div></div>`).join('')}</div>`;
  grid.appendChild(card);
});

// FICHIERS HTML
const filesEl=document.getElementById('filesSection');
FILES.forEach(f=>{
  const a=document.createElement('a'); a.className='file-link'; a.href=f;
  const name=f.replace('session_mrcp_','').replace('.html','').replace(/_/g,' / ');
  a.innerHTML=`<span style="font-size:20px">📄</span><div><div style="font-weight:700;font-size:13px">Rapport détaillé</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${name}</div></div>`;
  filesEl.appendChild(a);
});

// EVO GLOBAL
const pidsEvo=Object.keys(HISTORY).filter(pid=>HISTORY[pid].sessions.length>=2&&!HISTORY[pid].name.startsWith('Inconnu'));
if(pidsEvo.length){
  const allD=[...new Set(pidsEvo.flatMap(pid=>HISTORY[pid].sessions.map(s=>s.date)))].sort((a,b)=>sortDate(a).localeCompare(sortDate(b)));
  new Chart(document.getElementById('evoGlobal'),{type:'line',
    data:{labels:allD,datasets:pidsEvo.map((pid,i)=>{
      const p=HISTORY[pid];
      return {label:p.name.split(' ')[0],
        data:allD.map(d=>{const s=p.sessions.find(s=>s.date===d);return s?s.best:null;}),
        borderColor:PALETTE[i%PALETTE.length],backgroundColor:'transparent',
        pointRadius:5,borderWidth:2,tension:.3,spanGaps:false};
    })},
    options:{responsive:true,plugins:{legend:{labels:{color:'#7b82a8',font:{size:10}}}},
      scales:{x:{ticks:{color:'#7b82a8',font:{size:9}},grid:{color:'#1e2136'}},
        y:{ticks:{color:'#7b82a8',callback:v=>fmt(v)},grid:{color:'#1e2136'}}}}
  });
}else{
  document.getElementById('evoGlobal').parentElement.innerHTML=
    '<div class="empty-msg">Pas encore assez de sessions pour l'évolution globale.<br>Il faut au moins 2 sessions par pilote.</div>';
}

// EVO PAR PILOTE
const evoGrid=document.getElementById('evoGrid');
let hasEvo=false;
Object.keys(HISTORY).forEach((pid,idx)=>{
  const p=HISTORY[pid];
  if(p.sessions.length<2||p.name.startsWith('Inconnu')) return;
  hasEvo=true;
  const col=PALETTE[idx%PALETTE.length];
  const card=document.createElement('div'); card.className='evo-card';
  const cid=`evo_${pid}`;
  const sessSorted=[...p.sessions].sort((a,b)=>sortDate(a.date).localeCompare(sortDate(b.date)));
  card.innerHTML=`<div class="evo-name" style="color:${col}">${p.name}</div><canvas id="${cid}" height="160"></canvas>`;
  evoGrid.appendChild(card);
  new Chart(document.getElementById(cid),{type:'line',
    data:{labels:sessSorted.map(s=>s.date),datasets:[
      {label:'Meilleur',data:sessSorted.map(s=>s.best),borderColor:col,backgroundColor:'transparent',pointRadius:5,borderWidth:2,tension:.3},
      {label:'Moyenne',data:sessSorted.map(s=>s.mean),borderColor:col,backgroundColor:`${col}22`,pointRadius:3,borderWidth:1.5,tension:.3,borderDash:[4,3]},
    ]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#7b82a8',font:{size:9}}}},
      scales:{x:{ticks:{color:'#7b82a8',font:{size:8}},grid:{color:'#1e2136'}},
        y:{ticks:{color:'#7b82a8',callback:v=>fmt(v)},grid:{color:'#1e2136'}}}}
  });
});
if(!hasEvo) evoGrid.innerHTML='<div class="empty-msg">Pas encore assez de sessions pour l'évolution individuelle.</div>';
</script>
</body>
</html>
